<section id="proficiency" class="proficiency-section py-5 position-relative">
  <!-- Decorative Ambient Blob -->
  <div class="ambient-blur ambient-green" style="opacity: 0.05; left: 10%; bottom: 10%;"></div>

  <div class="container relative-content py-4">
    <!-- Header -->
    <div class="section-header animate-fade-in-up">
      <span class="section-subtitle">Competence</span>
      <h2 class="section-title text-gradient">Technology proficiency</h2>
      <p class="section-desc">
        A detailed breakdown of my engineering competencies and skill depths across critical systems.
      </p>
    </div>

    <!-- Proficiency Bars Grid -->
    <div class="row row-cols-1 row-cols-md-2 g-4 justify-content-center">
      @for (skill of proficiencies(); track skill.name) {
        <div class="col animate-fade-in-up">
          <div class="premium-card p-4">
            <!-- Label Row -->
            <div class="d-flex justify-content-between align-items-center mb-3">
              <span class="skill-name fw-bold">{{ skill.name }}</span>
              <span class="skill-percent fw-bold" [style.color]="skill.color">{{ skill.level }}%</span>
            </div>

            <!-- Progress Track -->
            <div class="progress-track-bar">
              <div 
                class="progress-fill-bar" 
                [style.width.%]="skill.level" 
                [style.background]="skill.color">
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
