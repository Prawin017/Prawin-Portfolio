<section id="skills" class="skills-section py-5 position-relative">
  <!-- Decorative Ambient Blob -->
  <div class="ambient-blur ambient-green"></div>

  <div class="container relative-content py-4">
    <!-- Header -->
    <div class="section-header animate-fade-in-up">
      <span class="section-subtitle">Skills</span>
      <h2 class="section-title text-gradient">My tech stack</h2>
      <p class="section-desc">
        All technologies, frameworks and tools I use to build robust and scalable applications.
      </p>
    </div>

    <!-- Cards Grid -->
    <div class="row g-4 justify-content-center">
      @for (category of categories(); track category.title) {
        <div class="col-md-6 col-xl-3 animate-fade-in-up">
          <div class="premium-card h-100 d-flex flex-column">
            <!-- Card Header -->
            <div class="d-flex align-items-center gap-3 mb-4">
              <div class="category-icon-wrapper" [ngClass]="category.badgeClass">
                <i class="bi" [ngClass]="category.icon"></i>
              </div>
              <h3 class="category-title mb-0">{{ category.title }}</h3>
            </div>

            <!-- Card Body (Tag List) -->
            <div class="skills-list d-flex flex-wrap gap-2 mt-auto">
              @for (skill of category.skills; track skill) {
                <span class="skill-tag" [ngClass]="category.badgeClass">
                  {{ skill }}
                </span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
