<header class="header-nav sticky-top" [class.header-scrolled]="isScrolled()">
  <div class="container py-3 d-flex align-items-center justify-content-between">
    <!-- Logo -->
    <a href="#" class="logo-text" appMagnetic [magneticStrength]="0.15" (click)="scrollToSection('about', $event)">
      Prawin's Portfolio<span class="dot">.</span>
    </a>

    <!-- Desktop Navigation Links & Action Widgets -->
    <div class="d-none d-md-flex align-items-center gap-4">
      <nav class="d-flex align-items-center gap-4">
        <a href="#about" class="nav-link-item" appMagnetic [magneticStrength]="0.2" (click)="scrollToSection('about', $event)">About</a>
        <a href="#skills" class="nav-link-item" appMagnetic [magneticStrength]="0.2" (click)="scrollToSection('skills', $event)">Skills</a>
        <a href="#work" class="nav-link-item" appMagnetic [magneticStrength]="0.2" (click)="scrollToSection('work', $event)">Work</a>
        <a href="#contact" class="nav-link-item" appMagnetic [magneticStrength]="0.2" (click)="scrollToSection('contact', $event)">Contact</a>
      </nav>

      <!-- Vertical Divider -->
      <div class="nav-divider"></div>

      <!-- Accent Theme Selector -->
      <div class="theme-selector d-flex align-items-center gap-2" title="Choose Accent Color">
        @for (t of themes; track t.name) {
          <button 
            class="theme-dot-btn"
            [class.active]="activeTheme() === t.name"
            [style.background-color]="t.color"
            [attr.aria-label]="'Theme ' + t.label"
            (click)="setTheme(t.name)">
          </button>
        }
      </div>

      <!-- Resume Action Button -->
      <a href="#contact" class="btn-resume" appMagnetic [magneticStrength]="0.25" (click)="scrollToSection('contact', $event)">Hire me</a>
    </div>

    <!-- Mobile Hamburger Toggle -->
    <button class="mobile-toggle-btn d-md-none" [class.open]="isMobileMenuOpen()" (click)="toggleMobileMenu()" aria-label="Toggle Navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <!-- Mobile Drawer Menu -->
  @if (isMobileMenuOpen()) {
  <div class="mobile-drawer d-md-none animate-fade-in-up">
    <nav class="d-flex flex-column align-items-center gap-4 py-5">
      <a href="#about" class="nav-link-mobile" (click)="scrollToSection('about', $event)">About</a>
      <a href="#skills" class="nav-link-mobile" (click)="scrollToSection('skills', $event)">Skills</a>
      <a href="#work" class="nav-link-mobile" (click)="scrollToSection('work', $event)">Work</a>
      <a href="#contact" class="nav-link-mobile" (click)="scrollToSection('contact', $event)">Contact</a>
      
      <!-- Mobile Theme Selector -->
      <div class="mobile-theme-picker mt-3 d-flex flex-column align-items-center gap-2">
        <span class="theme-label-sm">Customize Theme Accent</span>
        <div class="d-flex gap-3">
          @for (t of themes; track t.name) {
            <button 
              class="theme-dot-btn lg"
              [class.active]="activeTheme() === t.name"
              [style.background-color]="t.color"
              (click)="setTheme(t.name)">
            </button>
          }
        </div>
      </div>
      
      <a href="#contact" class="btn-resume mt-4 w-75 text-center" (click)="scrollToSection('contact', $event)">Hire me</a>
    </nav>
  </div>
  }

  <!-- Reading Progress Bar -->
  <div class="scroll-progress-container">
    <div class="scroll-progress-bar" [style.width.%]="scrollProgress()"></div>
  </div>
</header>
