<section id="highlights" class="highlights-section py-5 position-relative">
  <!-- Decorative Ambient Blob -->
  <div class="ambient-blur ambient-purple" style="opacity: 0.05; left: 50%; top: 30%;"></div>

  <div class="container relative-content py-4">
    <!-- Header -->
    <div class="section-header" [appScrollReveal]="'slide-up'">
      <span class="section-subtitle">Contributions</span>
      <h2 class="section-title text-gradient">Impact highlights</h2>
      <p class="section-desc">
        Key contributions and achievements that reflect my growth as a Software Engineer across product-based and
        client-driven projects.
      </p>
    </div>

    <!-- Highlights Grid -->
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 justify-content-center">
      @for (item of highlights(); track item.title) {
      <div class="col" [appScrollReveal]="'slide-up'" [delay]="$index * 120">
        <div class="premium-card h-100 d-flex flex-column align-items-center text-center p-4">
          <!-- Icon -->
          <div class="highlight-icon-circle mb-4" [ngClass]="item.colorClass">
            <i class="bi" [ngClass]="item.iconClass"></i>
          </div>

          <!-- Title -->
          <h3 class="highlight-title mb-2">{{ item.title | noBreakHyphen }}</h3>

          <!-- Description -->
          <p class="highlight-desc mb-0 text-muted">
            {{ item.description | noBreakHyphen }}
          </p>
        </div>
      </div>
      }
    </div>
  </div>
</section>
